<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CabGo - Complete Payment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="glass-panel"></header>

    <div id="loadingIndicator">
        <div class="spinner"></div>
        <p style="font-weight: 600; color: var(--primary);">Processing transaction...</p>
    </div>

    <main class="container">
        <div class="form-container glass-panel" style="max-width: 550px;">
            <h2 class="form-title" style="text-align: left;"><i class="fa-solid fa-credit-card"></i> Pay For Your Journey</h2>
            <p class="form-subtitle" style="text-align: left;">Verify ride fare details and select payment option</p>

            <div class="fare-estimate-box" style="display: block; margin-bottom: 2rem; background: rgba(56, 189, 248, 0.05); border-color: var(--secondary);">
                <div class="fare-row">
                    <span>Booking Details:</span>
                    <span id="payBookingId" style="font-weight: 600; color: var(--text-main);">#--</span>
                </div>
                <div class="fare-row">
                    <span>Tax & Toll Class:</span>
                    <span style="font-weight: 600; color: var(--success);">Included</span>
                </div>
                <div class="fare-row fare-total" style="border-top-color: rgba(255,255,255,0.08);">
                    <span>Total Amount Payable:</span>
                    <span id="payFare" style="color: var(--secondary); font-size: 1.5rem;">--</span>
                </div>
            </div>

            <form id="paymentForm">
                <div class="form-group">
                    <label class="form-label" for="paymentMethod">Select Payment Method</label>
                    <select id="paymentMethod" class="form-select" required>
                        <option value="UPI" selected>UPI (Google Pay, PhonePe, Paytm)</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                        <option value="Wallet">CabGo Digital Wallet</option>
                        <option value="Cash">Pay Cash to Driver</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary form-submit-btn" style="background: var(--success); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);"><i class="fa-solid fa-lock"></i> Authorize Secure Payment</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CabGo. Developed following Django & Fetch API reference patterns.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
